<script>
(function() {
    const catFilter = document.getElementById('catFilter');
    const tagFilter = document.getElementById('tagFilter');
    const searchInput = document.getElementById('searchInput');
    const articles = document.querySelectorAll('#blogList .blog-post-preview');
    const emptyState = document.getElementById('emptyState');
    let searchIndex = [];

    if (!articles.length) return;

    fetch('/search-index.json')
        .then(r => r.json())
        .then(data => { searchIndex = data; })
        .catch(() => {});

    let activeCat = 'all';
    let activeTag = 'all';

    const catCounts = {};
    const tagCounts = {};
    articles.forEach(art => {
        const cat = art.dataset.cat || '';
        catCounts[cat] = (catCounts[cat] || 0) + 1;
        (art.dataset.tags || '').split(',').filter(Boolean).forEach(t => {
            tagCounts[t] = (tagCounts[t] || 0) + 1;
        });
    });

    updateCounts();

    function updateCounts() {
        const newTagCounts = {};
        let totalInCat = 0;
        articles.forEach(art => {
            const artCat = art.dataset.cat || '';
            const catMatch = activeCat === 'all' || artCat === activeCat;
            if (!catMatch) return;
            totalInCat++;
            (art.dataset.tags || '').split(',').filter(Boolean).forEach(t => {
                newTagCounts[t] = (newTagCounts[t] || 0) + 1;
            });
        });

        if (tagFilter) {
            const allBtn = tagFilter.querySelector('[data-tag="all"]');
            allBtn.textContent = `所有标签 (${totalInCat})`;
            if (activeTag !== 'all' && !newTagCounts[activeTag]) {
                tagFilter.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
                allBtn.classList.add('active');
                activeTag = 'all';
            }
            tagFilter.querySelectorAll('.tag-btn[data-tag]:not([data-tag="all"])').forEach(btn => {
                const tag = btn.dataset.tag;
                const count = newTagCounts[tag] || 0;
                btn.textContent = count > 0 ? `${tag} (${count})` : tag;
                btn.style.display = count > 0 ? '' : 'none';
            });
        }

        if (catFilter) {
            catFilter.querySelectorAll('.cat-btn').forEach(btn => {
                const cat = btn.dataset.cat;
                const countSpan = btn.querySelector('.cat-count');
                if (cat === 'all') {
                    countSpan.textContent = articles.length;
                } else if (catCounts[cat]) {
                    countSpan.textContent = catCounts[cat];
                }
            });
        }
    }

    function getSearchScore(art, query) {
        if (!query) return -1;
        const q = query.toLowerCase();
        const title = (art.dataset.title || '').toLowerCase();
        const tags = (art.dataset.tags || '').toLowerCase();
        let score = 0;
        if (title.includes(q)) score += 10;
        if (tags.includes(q)) score += 5;
        if (searchIndex.length > 0) {
            const url = art.dataset.url;
            const entry = searchIndex.find(e => e.url === url);
            if (entry && entry.body && entry.body.toLowerCase().includes(q)) score += 1;
        }
        return score;
    }

    function filterArticles(selectedCat, selectedTag, searchQuery) {
        const q = (searchQuery || '').trim();
        const scored = [];

        articles.forEach(art => {
            const artCat = art.dataset.cat || '';
            const artTags = (art.dataset.tags || '').split(',').filter(Boolean);
            const catMatch = !selectedCat || selectedCat === 'all' || artCat === selectedCat;
            const tagMatch = !selectedTag || selectedTag === 'all' || artTags.includes(selectedTag);
            if (!catMatch || !tagMatch) {
                art.style.display = 'none';
                return;
            }
            const score = getSearchScore(art, q);
            if (q && score <= 0) {
                art.style.display = 'none';
                return;
            }
            scored.push({ el: art, score: score });
        });

        if (q && scored.length > 1) {
            scored.sort((a, b) => b.score - a.score);
        }

        const list = document.getElementById('blogList');
        scored.forEach(item => {
            item.el.style.display = '';
            list.appendChild(item.el);
        });

        const visibleCount = scored.length;
        emptyState.style.display = visibleCount === 0 ? '' : 'none';
        updateCounts();
    }

    // 分类筛选
    if (catFilter) {
        catFilter.addEventListener('click', function(e) {
            const btn = e.target.closest('.cat-btn');
            if (!btn) return;
            catFilter.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCat = btn.dataset.cat;
            if (tagFilter) {
                tagFilter.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
                tagFilter.querySelector('[data-tag="all"]').classList.add('active');
            }
            activeTag = 'all';
            filterArticles(activeCat, activeTag, searchInput ? searchInput.value : '');
        });
    }

    // 标签筛选
    if (tagFilter) {
        tagFilter.addEventListener('click', function(e) {
            const btn = e.target.closest('.tag-btn');
            if (!btn) return;
            if (btn.dataset.tag === 'all') {
                tagFilter.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeTag = 'all';
                filterArticles(activeCat, activeTag, searchInput ? searchInput.value : '');
                return;
            }
            tagFilter.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeTag = btn.dataset.tag;
            filterArticles(activeCat, activeTag, searchInput ? searchInput.value : '');
        });
    }

    // 搜索框
    if (searchInput) {
        let searchTimer;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                if (catFilter) {
                    catFilter.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    catFilter.querySelector('[data-cat="all"]').classList.add('active');
                }
                if (tagFilter) {
                    tagFilter.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
                    tagFilter.querySelector('[data-tag="all"]').classList.add('active');
                }
                activeCat = 'all';
                activeTag = 'all';
                filterArticles('all', 'all', this.value);
            }, 200);
        });
    }
})();
</script>
